<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a6cff">
<title>📊 Placar — Miguelimpíadas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css?v=12">
<link rel="stylesheet" href="assets/css/placar.css?v=12">
</head>
<body class="pl-body">

<header class="pl-header">
  <a href="/" class="pl-back" aria-label="Voltar para o guia do atleta">
    <span class="pl-back-arrow">←</span>
    <span class="pl-back-label">Guia do Atleta</span>
  </a>
  <button id="pl-key" class="pl-key-btn" aria-label="Entrar com PIN">🔑</button>
</header>

<main class="pl-main">

  <section class="pl-hero">
    <div class="pl-eyebrow">Ao vivo · sync &lt;1s</div>
    <h1 class="pl-title">📊 Placar</h1>
    <div class="pl-fase" id="pl-fase-wrap">
      <span>Fase atual:</span> <b id="pl-fase">—</b>
    </div>
  </section>

  <div class="pl-me-banner" id="pl-me-banner" hidden></div>

  <ol class="pl-list" id="pl-list">
    <li class="pl-empty">Carregando…</li>
  </ol>

  <section class="pl-admin" id="pl-admin" hidden>
    <h2 class="pl-admin-title">Painel Admin</h2>
    <input type="text" id="pl-admin-search" class="pl-admin-search" placeholder="🔍 Filtrar atleta por nome…" autocomplete="off">
    <div id="pl-admin-list" class="pl-admin-list"></div>
    <div class="pl-admin-global">
      <label class="pl-admin-toggle">
        <input type="checkbox" id="pl-oculto">
        <span>Placar oculto</span>
      </label>
      <div class="pl-admin-fase">
        <input type="text" id="pl-fase-input" placeholder="Fase (ex: Round 3)">
        <button id="pl-fase-save" class="pl-btn">Salvar fase</button>
      </div>
      <div class="pl-admin-actions">
        <button id="pl-add" class="pl-btn pl-btn-primary">+ Atleta</button>
        <button id="pl-reset" class="pl-btn pl-btn-danger">Resetar tudo</button>
      </div>
    </div>
  </section>

  <footer class="pl-foot">
    Miguelimpíadas · 16 de maio de 2026 · Casa do Peppa · Karaíba
  </footer>
</main>

<div class="pl-login-overlay" id="pl-login-overlay" role="dialog" aria-modal="true" aria-labelledby="pl-login-title">
  <form class="pl-login" id="pl-login-form" autocomplete="off">
    <h2 id="pl-login-title">🔑 Quem é você?</h2>
    <p class="pl-login-sub">Escolha sua identidade e digite sua senha. Se for sua 1ª vez, ela vira sua senha.</p>

    <label for="pl-login-who" class="pl-login-label">Identidade</label>
    <select id="pl-login-who" required>
      <option value="admin">👑 Admin (Miguel)</option>
    </select>

    <label for="pl-login-pin" class="pl-login-label">Senha</label>
    <input id="pl-login-pin" type="password" inputmode="text" autocomplete="off" required minlength="4" placeholder="Mínimo 4 caracteres">

    <div class="pl-login-err" id="pl-login-err"></div>

    <div class="pl-login-actions">
      <button type="button" class="pl-btn pl-btn-ghost" id="pl-login-cancel">Cancelar</button>
      <button type="submit" class="pl-btn pl-btn-primary">Entrar</button>
    </div>
  </form>
</div>

<script type="module" src="assets/js/placar.js?v=12"></script>
</body>
</html>
